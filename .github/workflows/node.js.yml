name: Node.js CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: webapp/ssbd202402

    steps:
      - name: Set up Node.js 16
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache-dependency-path: 'webapp/ssbd202402/yarn.lock'
          cache: 'yarn'
          
      - name: Setup node dependencies
        run: yarn
      - name: Build React App
        run: yarn build
